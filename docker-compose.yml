version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts

    container_name: jenkins

    restart: always

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_data:/var/jenkins_home

volumes:
  jenkins_data:

